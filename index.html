<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Changer Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎨 Background Changer Pro</h1>

        <div class="buttons">
            <button onclick="randomBackground()">Random</button>
            <button onclick="setTheme('sunset')">Sunset</button>
            <button onclick="setTheme('ocean')">Ocean</button>
            <button onclick="setTheme('forest')">Forest</button>
            <button onclick="toggleAuto()">Auto Mode</button>
        </div>

        <p id="colorCode">Current: Linear Gradient</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
